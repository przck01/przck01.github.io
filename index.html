<!DOCTYPE html>
<html>
<head>
    <title>For you ❤️</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to bottom, #ffc1d6, #ffeaf3);
            margin: 0;
            min-height: 100vh;
            font-size: 22px;
            overflow-x: hidden;
        }

        /* 🔐 ekran hasła */
        #lockScreen {
            position: fixed;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #ffc1d6, #ffeaf3);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 999;
        }

        #lockScreen input {
            padding: 10px;
            font-size: 18px;
            border-radius: 8px;
            border: none;
            margin-top: 10px;
        }

        /* 🔽 poprawione – przycisk niżej */
        #lockScreen button {
            margin-top: 20px;
        }

        #start {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }

        #content {
            display: none;
            margin-top: 30px;
            padding: 30px;
        }

        #giftBtn {
            display: none;
            position: fixed;
            right: 40px;
            top: 40%;
            font-size: 40px;
            cursor: pointer;
            z-index: 5;
        }

        #giftPage {
            display: none;
            height: 100vh;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 🌑 CIEMNE TŁO */
        #overlay {
            display: none;
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 6;
        }

        /* 💡 SPOTLIGHT */
        #spotlight {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 500px;
            height: 500px;
            transform: translate(-50%, -50%);
            background: radial-gradient(circle, rgba(255,255,255,0.25) 0%, transparent 70%);
            pointer-events: none;
            z-index: 7;
        }

        /* 🎁 pudełko */
        .gift-box {
            position: relative;
            width: 220px;
            height: 180px;
            background: #ff4d6d;
            border-radius: 12px;
            cursor: pointer;
            z-index: 8;
        }

        .lid {
            position: absolute;
            width: 220px;
            height: 50px;
            background: #ff758f;
            top: -50px;
            left: 0;
            border-radius: 8px;
            transition: 1s;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }

        .bow {
            font-size: 28px;
        }

        /* 🎬 VIDEO */
        .video {
            position: absolute;
            width: 160px;
            left: 50%;
            top: 0;
            transform: translateX(-50%) translateY(-120px) scale(0.7);
            opacity: 0;
            transition: 0.8s ease;
            border-radius: 12px;
            z-index: 10;
        }

        /* 🎬 stan końcowy – środek + powiększenie */
        .video.show {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(5.2);
            opacity: 1;
            z-index: 10;
        }

        button {
            padding: 18px 30px;
            font-size: 22px;
            border: none;
            border-radius: 12px;
            background-color: #89CFF0;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #FAA0A0;
        }

        img {
            width: 300px;
            max-width: 90%;
            border-radius: 15px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<div id="lockScreen">
    <h2>Enter password ❤️</h2>
    <input type="password" id="passwordInput">
    <button onclick="checkPassword()">Enter</button>
</div>

<div id="start">
    <h1>Hi ❤️</h1>
    <p>I've heard some handsome boy has birthday today...</p>
    <p>Do you know who it might be?</p>

    <div class="buttons">
        <button onclick="showContent()">Yes</button>
        <button id="noBtn">No</button>
    </div>
</div>

<div id="content">
    <h2>That's correct! 🎉</h2>
    <h2>Happy birthday, Elijah!</h2>

    <p>
        You've been making the world a better place for 24 years ❤️<br><br>
        May all your dreams come true!
    </p>

    <img src="IMG_3983.JPEG">
</div>

<div id="giftBtn" onclick="openGift()">🎁</div>

<!-- 🌑 overlay + spotlight -->
<div id="overlay"></div>
<div id="spotlight"></div>

<div id="giftPage">
    <div class="gift-box" onclick="openBox()">
        <div class="lid" id="lid">
            <div class="bow">🎀</div>
        </div>

        <video 
            class="video" 
            id="video" 
            src="VID_20220416_230748(0).mp4"
            playsinline
            preload="auto">
        </video>
    </div>
</div>

<audio id="music">
  <source src="nastelbom-happy-birthday-471481.mp3" type="audio/mpeg">
</audio>

<audio id="kiss">
  <source src="djartmusic-valentines-kissing-transition_10-297312.mp3" type="audio/mpeg">
</audio>

<script>
function checkPassword() {
    const input = document.getElementById("passwordInput").value;

    if(input === "polandspring") {
        document.getElementById("lockScreen").style.display = "none";
        document.getElementById("start").style.display = "flex";
    } else {
        alert("Wrong password 😏");
    }
}

function showContent() {
    document.getElementById("start").style.display = "none";
    document.getElementById("content").style.display = "block";

    document.getElementById("music").play();

    setTimeout(() => {
        document.getElementById("giftBtn").style.display = "block";
    }, 3000);
}

function openGift() {
    document.getElementById("content").style.display = "none";
    document.getElementById("giftBtn").style.display = "none";

    document.getElementById("overlay").style.display = "block";
    document.getElementById("spotlight").style.display = "block";

    const music = document.getElementById("music");
    music.pause();
    music.currentTime = 0;

    document.getElementById("giftPage").style.display = "flex";
}

function openBox() {
    document.getElementById("lid").style.transform = "translateY(-100px)";

    const video = document.getElementById("video");

    // 🎬 start – wychodzi z pudełka
    video.style.opacity = "1";
    video.style.transform = "translateX(-50%) translateY(-180px) scale(1)";
    video.play();

    // 🎬 potem – przejście na środek + większe powiększenie
    setTimeout(() => {
        video.classList.add("show");
    }, 700);

    document.getElementById("kiss").play();
}

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});
</script>

</body>
</html>
