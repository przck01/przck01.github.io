<!DOCTYPE html>
<html>
<head>
    <title>For you ❤️</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to bottom, #ffe6f0, #ffffff);
            margin: 0;
            min-height: 100vh;
            font-size: 22px;
            overflow-x: hidden;
        }

        /* wyśrodkowanie całej pierwszej sekcji */
        #start {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        #content {
            display: none;
            margin-top: 30px;
            padding: 30px;
            animation: fadeIn 1s;
        }

        button {
            padding: 18px 30px;
            font-size: 22px;
            margin: 10px;
            border: none;
            border-radius: 12px;
            background-color: #89CFF0;
            color: white;
            cursor: pointer;
            position: relative;
        }

        #noBtn {
            position: absolute;
        }

        button:hover {
            background-color: #FAA0A0;
        }

        img {
            width: 300px;
            max-width: 90%;
            border-radius: 15px;
            margin-top: 20px;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        /* konfetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }
    </style>
</head>

<body>

<div id="start">
    <h1>Hi ❤️</h1>

    <p>I've heard some handsome boy has birthday today...</p>
    <p>Do you know who it might be?</p>

    <button onclick="showContent()">Yes</button>
    <button id="noBtn">No</button>
</div>

<div id="content">
    <h2>That's correct! 🎉</h2>
    <h2>Happy birthday, Elijah!</h2>

    <p>
        You've been making the world a better place for 24 years ❤️<br><br>
        May all your dreams come true!
    </p>

    <img src="IMG_3983">

    <p>❤️</p>
</div>

<!-- 🎵 muzyka -->
<audio id="music">
  <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
function showContent() {
    document.getElementById("start").style.display = "none";
    document.getElementById("content").style.display = "block";

    startConfetti();

    // ▶️ odtwórz muzykę
    document.getElementById("music").play();
}

// 🎊 konfetti
function startConfetti() {
    for (let i = 0; i < 120; i++) {
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor = 
            ["#ff4d6d", "#ffd166", "#06d6a0", "#118ab2"][Math.floor(Math.random()*4)];
        confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";

        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 5000);
    }
}

// 😏 uciekający przycisk
const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});
</script>

</body>
</html>
