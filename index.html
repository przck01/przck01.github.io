<!DOCTYPE html>
<html>
<head>
    <title>For you ❤️</title>

    <style>
        body {
            font-family: Avalon;
            text-align: center;
            background: linear-gradient(to bottom, #ffe6f0, #fff);
            padding: 50px;
        }

        #content {
            display: none;
            margin-top: 30px;
        }

        button {
            padding: 15px 25px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            background-color: #89CFF0;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #FAA0A0;
        }

        img {
            width: 300px;
            border-radius: 15px;
            margin-top: 20px;
        }
    </style>
</head>

<body>

<h1>Hi ❤️</h1>

<p>I've heard some handsome boy has birthday today...</p>
    <p>Do you know who it might be?</p>

<button onclick="showContent()">Yes</button>

<div id="content">
    <h2>That's correct! 🎉</h2>
    <h2>Happy birthday, Elijah!</h2>

    <p>
        You've been making the world a better place for 24 years ❤️<br><br>
        May all your dreams come true!
    </p>

    <img src="https://via.placeholder.com/300">

    <p>❤️</p>
</div>

<script>
function showContent() {
    document.getElementById("content").style.display = "block";
}
</script>

</body>
</html>
