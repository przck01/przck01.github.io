<!DOCTYPE html>
<html>
<head>
    <title>For you ❤️</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background: linear-gradient(to bottom, #ffc1d6, #ffeaf3);
            margin: 0;
            min-height: 100vh;
            font-size: 22px;
            overflow-x: hidden;
        }

        #start {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-top: 20px;
        }

        #content {
            display: none;
            margin-top: 30px;
            padding: 30px;
            animation: fadeIn 1s;
        }

        #giftBtn {
            display: none;
            position: fixed;
            right: 40px;
            top: 40%;
            font-size: 40px;
            cursor: pointer;
        }

        #giftPage {
            display: none;
            height: 100vh;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        /* 🎁 pudełko */
        .gift-box {
            position: relative;
            width: 220px;
            height: 180px;
            background: #ff4d6d;
            border-radius: 12px;
            cursor: pointer;
            overflow: visible;
        }

        /* pionowa wstążka (środek) */
        .gift-box::before {
            content: "";
            position: absolute;
            width: 30px;
            height: 100%;
            background: #ffd166;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1;
        }

        /* pozioma wstążka */
        .gift-box::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 25px;
            background: #ffd166;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
        }

        /* pokrywka */
        .lid {
            position: absolute;
            width: 220px;
            height: 50px;
            background: #ff758f;
            top: -50px;
            left: 0;
            border-radius: 8px;
            transition: 1s;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🎀 kokardka TERAZ NA POKRYWCE */
        .bow {
            font-size: 30px;
        }

        /* 🎬 VIDEO */
        .video {
            position: absolute;
            width: 120px;
            left: 50%;
            transform: translateX(-50%) translateY(-120px) scale(0.5);
            top: 0;
            opacity: 0;
            transition: 1s ease;
            border-radius: 12px;
        }

        button {
            padding: 18px 30px;
            font-size: 22px;
            border: none;
            border-radius: 12px;
            background-color: #89CFF0;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background-color: #FAA0A0;
        }

        #noBtn {
            position: relative;
        }

        img {
            width: 300px;
            max-width: 90%;
            border-radius: 15px;
            margin-top: 20px;
        }

        @keyframes fadeIn {
            from {opacity: 0;}
            to {opacity: 1;}
        }

        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            top: -10px;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to {
                transform: translateY(100vh);
            }
        }
    </style>
</head>

<body>

<div id="start">
    <h1>Hi ❤️</h1>

    <p>I've heard some handsome boy has birthday today...</p>
    <p>Do you know who it might be?</p>

    <div class="buttons">
        <button onclick="showContent()">Yes</button>
        <button id="noBtn">No</button>
    </div>
</div>

<div id="content">
    <h2>That's correct! 🎉</h2>
    <h2>Happy birthday, Elijah!</h2>

    <p>
        You've been making the world a better place for 24 years ❤️<br><br>
        May all your dreams come true!
    </p>

    <img src="IMG_3983.JPEG">

    <p>❤️</p>
    <p>Paula</p>
</div>

<div id="giftBtn" onclick="openGift()">🎁</div>

<div id="giftPage">
    <div class="gift-box" onclick="openBox()">
        <div class="lid" id="lid">
            <div class="bow">🎀</div>
        </div>

        <!-- 🎬 VIDEO zamiast zdjęcia -->
        <video class="video" id="video" src="video.mp4"></video>
    </div>
</div>

<audio id="music">
  <source src="nastelbom-happy-birthday-471481.mp3" type="audio/mpeg">
</audio>

<audio id="kiss">
  <source src="djartmusic-valentines-kissing-transition_10-297312.mp3" type="audio/mpeg">
</audio>

<script>
function showContent() {
    document.getElementById("start").style.display = "none";
    document.getElementById("content").style.display = "block";

    startConfetti();
    document.getElementById("music").play();

    setTimeout(() => {
        document.getElementById("giftBtn").style.display = "block";
    }, 3000);
}

function openGift() {
    document.getElementById("content").style.display = "none";
    document.getElementById("giftBtn").style.display = "none";

    const music = document.getElementById("music");
    music.pause();
    music.currentTime = 0;

    document.getElementById("giftPage").style.display = "flex";
}

function openBox() {
    document.getElementById("lid").style.transform = "translateY(-100px)";

    const video = document.getElementById("video");
    video.style.opacity = "1";
    video.style.transform = "translateX(-50%) translateY(-40px) scale(1.4)";

    video.play();

    document.getElementById("kiss").play();
}

function startConfetti() {
    for (let i = 0; i < 120; i++) {
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");

        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor =
            ["#ff4d6d", "#ffd166", "#06d6a0", "#118ab2"][Math.floor(Math.random()*4)];
        confetti.style.animationDuration = (Math.random() * 3 + 2) + "s";

        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 5000);
    }
}

const noBtn = document.getElementById("noBtn");

noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);

    noBtn.style.position = "fixed";
    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";
});
</script>

</body>
</html>
